repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
  - repo: local
    hooks:
      - id: lint-tests
        name: lint-tests (narrative comments + docstring shape)
        entry: python -m pytest tests/test_lint.py --no-header -q
        language: system
        types: [python]
        pass_filenames: false
