name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/preframr-tokens
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Publish to PyPI (trusted publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Wait until the published version is installable from PyPI
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Confirming preframr-tokens==${version} is installable from PyPI (CDN propagation)..."
          for attempt in $(seq 1 40); do
            if pip download --no-deps --no-cache-dir --dest /tmp/pypi-propagation-check \
                "preframr-tokens==${version}" >/dev/null 2>&1; then
              echo "preframr-tokens==${version} is installable (attempt ${attempt})."
              exit 0
            fi
            echo "attempt ${attempt}: not yet visible on the PyPI index, retrying in 15s..."
            sleep 15
          done
          echo "::error::preframr-tokens==${version} did not become installable within the timeout" >&2
          exit 1
