name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build docker image (runs run_tests.sh gate inside build)
        run: docker build --build-arg PYTHON_VERSION=${{ matrix.python-version }} -t preframr-tokens-test:${{ matrix.python-version }} .
