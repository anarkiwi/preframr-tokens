name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # The gate-fixture register dumps are committed under tests/test_fixtures
      # (deterministic VICE ground truth; see that directory's .gitignore allowlist).
      # CI no longer renders them in the headlessvice container -- the committed
      # dumps ARE the oracle, and the byte-exact recover/verify gate tests fail if
      # any committed dump is wrong. No Docker-in-Docker render step is needed.
      - name: Build test image
        run: docker build --build-arg PYTHON_VERSION=${{ matrix.python-version }} -t preframr-tokens-test:${{ matrix.python-version }} .
      # Run the full run_tests.sh gate with the committed dumps mounted into the
      # cache the fixtures resolve to (the dumps are not baked into the image; see
      # .dockerignore -- they are mounted so the gate uses the checked-out copy).
      - name: Run gate (committed dumps mounted)
        run: docker run --rm -v "$PWD/tests/test_fixtures:/tok/tests/test_fixtures" preframr-tokens-test:${{ matrix.python-version }}
