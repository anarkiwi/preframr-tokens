name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Render the register-dump fixtures in the headlessvice VICE container on the
      # runner (which has Docker) -- they cannot be produced inside a `docker build`.
      # Pure stdlib + the container; no Python deps needed on the runner.
      - name: Render register-dump fixtures
        run: python3 tests/_dump_fixture.py
      - name: Build test image
        run: docker build --build-arg PYTHON_VERSION=${{ matrix.python-version }} -t preframr-tokens-test:${{ matrix.python-version }} .
      # Run the full run_tests.sh gate with the rendered dumps mounted into the cache
      # the fixtures resolve to (no dumps are baked into the image; see .dockerignore).
      - name: Run gate (dumps mounted)
        run: docker run --rm -v "$PWD/tests/test_fixtures:/tok/tests/test_fixtures" preframr-tokens-test:${{ matrix.python-version }}

  # Phase 2a: prove the preframr-sidtrace dump backend is byte-exact vs the
  # headlessvice/VICE dump on the gate fixtures. Separate job (does NOT bloat the
  # 3-python docker matrix above); builds the patched libsidplayfp once, cached.
  # Renders the VICE oracle dumps in the headlessvice container, traces the same
  # tunes with sidtrace, and runs only tests/test_sidtrace_parity.py.
  sidtrace-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install runner deps (sidtrace toolchain + python test deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool \
            pkg-config xa65
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install numpy pandas pyarrow pytest
      - name: Cache built sidtrace
        id: cache-sidtrace
        uses: actions/cache@v4
        with:
          path: preframr-sidtrace/build/sidtrace
          key: sidtrace-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
      - name: Build sidtrace (patched libsidplayfp)
        if: steps.cache-sidtrace.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/anarkiwi/preframr-sidtrace
          cd preframr-sidtrace
          git submodule update --init --recursive
          make
      - name: Render headlessvice (VICE) oracle dumps
        run: python3 tests/_dump_fixture.py
      - name: Parity proof (sidtrace == headlessvice, byte-exact)
        env:
          SIDTRACE_BIN: ${{ github.workspace }}/preframr-sidtrace/build/sidtrace
        run: python3 -m pytest tests/test_sidtrace_parity.py -v -p no:cacheprovider
