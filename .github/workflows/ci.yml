name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check preframr_tokens tests
      - name: pylint
        run: pylint preframr_tokens tests
      - name: pyright
        run: pyright preframr_tokens
      - name: pytest + coverage (>= 80%)
        run: pytest --cov=preframr_tokens --cov-report=term-missing --cov-fail-under=80 --deselect tests/test_reglogparser.py::TestRegLogParser::test_remove_voice_reg
